name: Build Admin (Windows x64)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# 独立工作流：各架构互不影响，任一失败都不阻塞其他架构发布到同一 tag。
jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 动态链接：下载预编译 shared ffmpeg（8.1 分支，与 macOS brew / ffmpeg-next 8.1 对齐），
      # 设置 FFMPEG_DIR 供 ffmpeg-sys-next 动态链接，并把 av*/sw* 运行时 DLL 复制到
      # src-tauri/ffmpeg，由 tauri.windows.conf.json 打进安装包（放到 exe 同目录）。
      - name: Setup FFmpeg (shared, dynamic link)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-win64-gpl-shared-8.1.zip"
          curl.exe -L $url -o ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath "$env:RUNNER_TEMP\ffmpeg" -Force
          $root = (Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Directory | Select-Object -First 1).FullName
          "FFMPEG_DIR=$root" >> $env:GITHUB_ENV
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          "$root\bin" >> $env:GITHUB_PATH
          New-Item -ItemType Directory -Force -Path admin/src-tauri/ffmpeg | Out-Null
          Copy-Item "$root\bin\*.dll" admin/src-tauri/ffmpeg/ -Force

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Write env files from GitHub Secrets
        shell: pwsh
        env:
          TARO_APP_ID: ${{ secrets.TARO_APP_ID }}
          TARO_APP_CLOUD_ENV_ID: ${{ secrets.TARO_APP_CLOUD_ENV_ID }}
          CLOUDBASE_SECRET_ID: ${{ secrets.CLOUDBASE_SECRET_ID }}
          CLOUDBASE_SECRET_KEY: ${{ secrets.CLOUDBASE_SECRET_KEY }}
          TARO_APP_CLOUD_ENV_ID_TEST: ${{ secrets.TARO_APP_CLOUD_ENV_ID_TEST }}
          TARO_APP_CLOUD_ENV_ID_PRODUCTION: ${{ secrets.TARO_APP_CLOUD_ENV_ID_PRODUCTION }}
          CLOUDBASE_SECRET_ID_TEST: ${{ secrets.CLOUDBASE_SECRET_ID_TEST }}
          CLOUDBASE_SECRET_KEY_TEST: ${{ secrets.CLOUDBASE_SECRET_KEY_TEST }}
          CLOUDBASE_SECRET_ID_PRODUCTION: ${{ secrets.CLOUDBASE_SECRET_ID_PRODUCTION }}
          CLOUDBASE_SECRET_KEY_PRODUCTION: ${{ secrets.CLOUDBASE_SECRET_KEY_PRODUCTION }}
          ADMIN_UPDATE_CDN_BASE: ${{ secrets.ADMIN_UPDATE_CDN_BASE }}
        run: node scripts/write-env-from-secrets.mjs --ci

      - name: Build Tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TARO_APP_ID: ${{ secrets.TARO_APP_ID }}
          TARO_APP_CLOUD_ENV_ID: ${{ secrets.TARO_APP_CLOUD_ENV_ID }}
          CLOUDBASE_SECRET_ID: ${{ secrets.CLOUDBASE_SECRET_ID }}
          CLOUDBASE_SECRET_KEY: ${{ secrets.CLOUDBASE_SECRET_KEY }}
          TARO_APP_CLOUD_ENV_ID_TEST: ${{ secrets.TARO_APP_CLOUD_ENV_ID_TEST }}
          TARO_APP_CLOUD_ENV_ID_PRODUCTION: ${{ secrets.TARO_APP_CLOUD_ENV_ID_PRODUCTION }}
          CLOUDBASE_SECRET_ID_TEST: ${{ secrets.CLOUDBASE_SECRET_ID_TEST }}
          CLOUDBASE_SECRET_KEY_TEST: ${{ secrets.CLOUDBASE_SECRET_KEY_TEST }}
          CLOUDBASE_SECRET_ID_PRODUCTION: ${{ secrets.CLOUDBASE_SECRET_ID_PRODUCTION }}
          CLOUDBASE_SECRET_KEY_PRODUCTION: ${{ secrets.CLOUDBASE_SECRET_KEY_PRODUCTION }}
          ADMIN_UPDATE_CDN_BASE: ${{ secrets.ADMIN_UPDATE_CDN_BASE }}
        run: pnpm -C admin tauri build

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: admin-windows-x64
          path: admin/src-tauri/target/release/bundle/**
          if-no-files-found: error

      - name: Create GitHub Release and upload assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: releases/${{ github.ref_name }}.md
          files: |
            admin/src-tauri/target/release/bundle/nsis/*-setup.exe
            admin/src-tauri/target/release/bundle/msi/*.msi

      - name: Publish update to CloudBase COS
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          node scripts/publish-admin-update.mjs --env production --platform windows-x86_64 --version $VERSION
